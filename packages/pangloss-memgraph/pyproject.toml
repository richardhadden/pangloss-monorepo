[project]
name = "pangloss-memgraph"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Richard Hadden", email = "rwjhadden@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "neo4j>=6.2.0",
    "pangloss-models",
    "pangloss-sdk",
    "pangloss-users",
    "pytest-asyncio>=1.4.0",
]

[build-system]
requires = ["uv_build>=0.11.8,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
pangloss-models = { workspace = true }
pangloss-sdk = { workspace = true }
pangloss-users = { workspace = true }

[dependency-groups]
dev = [
    "docker>=7.1.0",
    "pytest-asyncio>=1.4.0",
    "tenacity>=9.1.4",
]
